version: '3.9'

services:
  postgres:
    image: postgres:16

    container_name: cifar10_postgres

    restart: always

    env_file:
      - .env

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jeevan"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
